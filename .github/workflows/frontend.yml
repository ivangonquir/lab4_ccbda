name: Update frontend in CloudFront

on:
  push:
    branches: ["main"]
    paths:
      - 'frontend/**'

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Required Secrets (Node.js)
        shell: node {0}
        run: |
          const required = [
            "NEXT_PUBLIC_API_URL", 
            "AWS_ACCESS_KEY_ID", 
            "AWS_SECRET_ACCESS_KEY", 
            "AWS_DEFAULT_REGION", 
            "S3_BUCKET_NAME", 
            "CLOUDFRONT_ID"
          ];
          
          const secrets = JSON.parse(process.env.SECRETS_JSON);
          const missing = required.filter(key => !secrets[key]);
          
          if (missing.length > 0) {
            console.error("Missing Secrets:", missing.join(", "));
            process.exit(1);
          }
          console.log("All required secrets are present.");
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js Static App
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Sync Files to S3
        run: aws s3 sync out/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_ID }} --paths "/*"
